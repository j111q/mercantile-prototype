<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mercantile — wordpress.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=UnifrakturCook:wght@700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../shared/catalog.js"></script>
<script src="../shared/product-art.js"></script>
<style>
  :root {
    /* Cap the store's content width — above this, we center on the page
       instead of stretching. */
    --max-w: 1600px;
    --wp:     #3858e9;
    --wp-d:   #183ad6;
    /* Neutral greys lifted from the real wp-admin palette. */
    --ink:    #1d2327;  /* wp-admin base ink */
    --ink-2:  #2c3338;  /* wp-admin menu dark */
    --slate:  #646970;  /* wp-admin muted text */
    --slate-2:#8c8f94;  /* wp-admin subtle text */
    --rule:   #c3c4c7;  /* wp-admin default border */
    --rule-2: #dcdcde;  /* wp-admin soft border */
    --paper:  #f0f0f1;  /* wp-admin body background */
    --paper-2:#f6f7f7;  /* wp-admin hover / subtle panel */
    --card:   #ffffff;  /* wp-admin post card */
    --accent: #d63638;  /* wp-admin red */
    --ok:     #1f8f3a;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--paper); color: var(--ink); font: 14px/1.5 'Newsreader', Georgia, serif; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; background: none; border: 0; color: inherit; padding: 0; }
  .mono, code, kbd, pre { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
  ::selection { background: var(--wp); color: #fff; }

  /* ========== WIDTH CAPS ==========
     Full-width bars (ticker, section-head, footer, grid's bottom line)
     stay edge-to-edge. Content bleeds to --max-w via a dynamic side
     gutter — so trim lines/backgrounds reach the viewport edges while
     the body content stays centered on wide monitors. */
  :root { --gutter: max(40px, calc(50vw - var(--max-w) / 2)); }

  /* ========== TICKER (the "actively updating" strip) ========== */
  .ticker {
    position: sticky; top: 0; z-index: 50;
    background: var(--ink);
    border-bottom: 1px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #9a9ca3;
    height: 34px;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }
  .ticker .lead {
    padding: 0 12px;
    display: flex; align-items: center; gap: 8px;
    border-right: 1px solid rgba(255,255,255,0.12);
    background: var(--ink);
    color: #ecebe4;
    font-weight: 600;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .ticker .lead .wp-mark { display: inline-flex; color: #ecebe4; line-height: 0; }
  .ticker .lead .wp-mark svg { display: block; }
  .ticker .lead .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: pulse 2s infinite; flex-shrink: 0; }
  /* Clicked-paused state — ticker stops, dot goes amber, lead reads 'PAUSED BY USER'. */
  .ticker.paused .track { animation-play-state: paused !important; }
  .ticker.paused .lead .dot { background: #f5b800; animation: none; }
  .ticker .lead { border: 0; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .ticker .rail {
    flex: 1; overflow: hidden; position: relative; display: flex; align-items: center;
  }
  .ticker .track {
    display: flex; gap: 40px; white-space: nowrap; padding-left: 16px;
    animation: marquee 90s linear infinite;
  }
  .ticker .track:hover { animation-play-state: paused; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .ticker .item b { color: #ecebe4; font-weight: 600; }
  .ticker .item.wapuu { color: #9fb1ff; font-weight: 600; }
  .ticker .item.wapuu::before { content: '✿ '; }
  .ticker .tab { padding: 0 12px; border-left: 1px solid rgba(255,255,255,0.12); display:flex; align-items: center; gap: 8px; flex-shrink:0; background: var(--ink); }
  .ticker .tab .v { color: #ecebe4; font-weight: 600; }
  .ticker .tab.new { color: #ecebe4; gap: 5px; transition: color 0.15s; }
  .ticker .tab.new .plus {
    font-weight: 700; font-size: 13px; line-height: 1; color: inherit;
  }
  .ticker .tab.new:hover { color: #9fb1ff; }

  /* ========== HERO ========== */
  .hero {
    padding: 48px var(--gutter) 0;
    position: relative;
    border-bottom: 1px solid var(--rule);
  }
  .hero .meta-strip {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--slate);
    letter-spacing: 0.04em; text-transform: uppercase;
    padding-bottom: 8px; border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
    flex-wrap: wrap; gap: 12px;
  }
  .hero .meta-strip b { color: var(--ink); font-weight: 600; }
  .hero .meta-strip .col { display:flex; flex-direction:column; gap:2px; }
  .hero .meta-strip .col.r { text-align:right; }

  .hero .mark {
    font-family: 'UnifrakturCook', serif; font-weight: 700;
    font-size: clamp(96px, 14vw, 195px);
    line-height: 1;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin: 12px 0 0;
    padding: 0;
    text-wrap: balance;
    position: relative;
  }
  .hero .mark .dot { color: var(--wp); }
  .hero .mark::after {
    content: '';
    display: block;
    height: 1px; background: var(--rule);
    margin-top: 12px;
  }

  .hero .rail-row {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px;
    padding: 20px 0 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--slate);
    line-height: 1.7;
    /* No border-bottom — the hero's own border-bottom sits directly beneath
       and was doubling against this one. */
  }
  .hero .rail-row .blurb { font-family: 'Newsreader', serif; font-size: 17px; color: var(--ink); line-height: 1.4; font-style: italic; font-weight: 400; max-width: 38ch; }
  .hero .rail-row .blurb em { color: var(--wp); font-style: italic; }
  .hero .rail-row b { color: var(--ink); font-weight: 600; }
  .hero .rail-row .kv { display:flex; justify-content:space-between; border-bottom: 1px dashed var(--rule); padding: 2px 0; }
  .hero .rail-row .kv:last-child { border-bottom: 0; }

  /* decorative code margin texture on hero */

  /* ========== SECTION HEAD / FILTER BAR ========== */
  .section-head {
    position: sticky; top: 34px; z-index: 40;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px var(--gutter);
    gap: 20px; flex-wrap: wrap;
  }
  .section-head .label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--slate); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .section-head .filters {
    display: flex; gap: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    border: 1px solid var(--rule); background: var(--paper-2);
  }
  .section-head .filters button {
    padding: 6px 12px; color: var(--wp); border-right: 1px solid var(--rule);
    display: flex; align-items: baseline; gap: 5px;
    line-height: 1.4; box-sizing: border-box;
  }
  .section-head .filters button:last-child { border-right: 0; }
  .section-head .filters button.on { background: var(--ink); color: var(--paper); }
  .section-head .filters button .n { font-size: 10px; color: var(--slate-2); }
  .section-head .filters button.on .n { color: var(--slate-2); }
  .section-head .filters button:hover:not(.on) { color: var(--wp); background: var(--card); }
  .section-head .filters-m { display: none; }

  .section-head .right { display:flex; gap: 10px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .section-head .right .search {
    border: 1px solid var(--rule); background: var(--paper-2);
    padding: 6px 10px; width: 220px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--ink); line-height: 1.4; box-sizing: border-box;
  }
  .section-head .right .search::placeholder { color: var(--slate-2); }
  .section-head .right .search:focus { outline: none; border-color: var(--wp); background: #fff; }
  .section-head .right .cart {
    display:flex; align-items: baseline; gap: 6px; color: var(--ink); padding: 6px 10px;
    border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    font-size: 12px; line-height: 1.4; box-sizing: border-box;
  }
  .section-head .right .cart .n { color: #fff; font-weight: 700; }

  /* ========== GRID ========== */
  .grid-wrap { padding: 0 var(--gutter); }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-left: 1px solid var(--rule);
    /* No border-top — section-head's border-bottom already provides the
       line above the grid. */
  }
  /* Synthetic full-width line under the last row of products. Extends
     beyond the grid via negative horizontal margins = --gutter, and
     overlaps the last row of cells' border-bottom via margin-top:-1px
     so the seam reads as ONE line even at the gutter transition. */
  .grid::after {
    content: '';
    grid-column: 1 / -1;
    border-top: 1px solid var(--rule);
    margin: -1px calc(-1 * var(--gutter)) 0;
  }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px)  { .grid { grid-template-columns: 1fr; } }

  /* Gentle stagger on cells when the filter or query changes. React
     remounts the grid via key so each cell plays the animation. */
  @keyframes hl-fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .grid .cell { animation: hl-fade-up 380ms cubic-bezier(.2,.7,.3,1) both; animation-delay: calc(var(--i, 0) * 25ms); }
  @media (prefers-reduced-motion: reduce) { .grid .cell { animation: none; } }

  .cell {
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    padding: 14px 14px 12px;
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    min-height: 340px;
  }
  .cell:hover { background: var(--card); }
  .cell:hover .t { color: var(--wp); }
  .cell .idx {
    position: absolute; top: 8px; left: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--slate-2); letter-spacing: 0.05em;
  }
  .cell .price-tag {
    position: absolute; top: 8px; right: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink); font-weight: 600;
  }
  .cell .img {
    aspect-ratio: 1; margin-top: 16px;
    background: var(--paper-2); border: 1px solid var(--rule);
    overflow: hidden; position: relative;
  }
  .cell .img svg { width: 100%; height: 100%; display:block; }
  .cell .img .stamp {
    position: absolute; bottom: 6px; left: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--slate); letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(236,235,228,0.85); padding: 1px 5px;
  }
  /* Status stamp below the image — match PDP marginalia pill style. */
  .cell .stamp {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate);
    padding: 2px 8px; border: 1px solid var(--rule); border-radius: 2px;
    background: var(--paper-2);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .cell .stamp .stamp-icn {
    font-size: 1.1em; line-height: 1;
    display: inline-flex; align-items: center;
    transform: translateY(-1px); /* optical centering — geometric glyphs sit low */
  }
  .cell .meta-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--slate); letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .cell .t {
    font-family: 'Newsreader', serif; font-size: 17px; font-weight: 500;
    color: var(--ink); line-height: 1.15;
    text-wrap: balance; transition: color 0.12s;
    letter-spacing: -0.005em;
  }
  /* Fake typing caret — only on the PDP title (input-field). */
  .modal .editor h1::after {
    content: '';
    display: inline-block;
    width: 0.06em;
    height: 0.9em;
    background: var(--wp);
    margin-left: 0.2em;
    vertical-align: -0.08em;
    animation: caret-blink 1.1s steps(2, start) infinite;
  }
  @keyframes caret-blink { to { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .modal .editor h1::after { animation: none; opacity: 0.9; }
  }
  .cell .tags {
    display: flex; gap: 4px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--slate); margin-top: auto;
  }
  .cell .tags span::before { content: '#'; color: var(--slate-2); }
  .cell .add {
    position: absolute; bottom: 12px; right: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--wp); font-weight: 500; letter-spacing: 0.02em;
    opacity: 0; transition: opacity 0.1s;
  }
  .cell:hover .add { opacity: 1; }

  /* code interstitial row (spans full width) */
  .interstitial {
    grid-column: 1 / -1;
    /* margin-top -1px pulls the interstitial over the cells' bottom borders
       above it. Its own border-top then re-draws a single clean line that
       also fills in across any empty grid cells in an incomplete row. */
    margin-top: -1px;
    border-top: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 14px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    color: var(--slate);
    letter-spacing: 0.02em;
    background: var(--paper-2);
    line-height: 0.8;
    display: flex; gap: 4px 18px; flex-wrap: wrap;
    align-items: baseline;
    position: relative;
  }
  .interstitial b { color: var(--ink); font-weight: 600; }
  .interstitial .k { color: var(--wp); }
  .interstitial .c { color: var(--slate-2); }

  /* ========== INTERSTITIAL BAND (adam-ho-ish text texture) ========== */
  .band {
    padding: 32px var(--gutter) 48px;
    /* No border-top — the grid's ::after line sits right above us. */
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    overflow: hidden;
  }
  .band .line {
    font-family: 'UnifrakturCook', serif;
    font-weight: 700;
    font-size: clamp(36px, 6vw, 84px);
    line-height: 1.02;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin: 0;
    text-wrap: balance;
  }
  .band .line .q { color: var(--wp); font-style: normal; }
  .band .line.italic { font-family: 'Newsreader', serif; font-style: italic; font-weight: 400; }
  .band .line.mono { font-family: 'Newsreader', Georgia, serif; font-style: italic; font-weight: 400; font-size: clamp(16px, 1.5vw, 20px); color: var(--ink-2); letter-spacing: 0; line-height: 1.5; margin-top: 20px; max-width: 42em; text-wrap: balance; }
  .band .line.mono b { color: var(--ink); font-weight: 600; }
  .band .line.mono em { color: var(--wp); font-style: normal; }
  .band .rule { height: 1px; background: var(--rule); margin: 24px calc(-1 * var(--gutter)); }

  /* ========== FOOTER ========== */
  .footer-band {
    padding: 64px var(--gutter) 24px; background: var(--ink); color: var(--paper);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 32px;
    line-height: 1.7;
  }
  @media (max-width: 800px) { .footer-band { grid-template-columns: 1fr; } }
  .footer-band .frak { font-family: 'UnifrakturCook', serif; font-size: 63px; line-height: 0.9; color: var(--paper); }
  .footer-band .frak .d { color: var(--wp); }
  .footer-band h4 { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate-2); margin: 0 0 8px; font-weight: 500; }
  .footer-band a:hover { color: var(--wp); }
  .footer-band .bottom-row {
    grid-column: 1 / -1;
    border-top: 1px solid var(--slate);
    padding-top: 14px; margin-top: 28px;
    display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    color: var(--slate-2);
  }
  .footer-band .bottom-row b { color: var(--paper); }

  /* ========== MODAL (edit-post style, toned down) ========== */
  .modal-back {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px; overflow-y: auto;
    background: rgba(240,240,241,0.4);
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    animation: mb-fadeIn 0.28s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes mb-fadeIn {
    from { opacity: 0; backdrop-filter: blur(0); -webkit-backdrop-filter: blur(0); }
    to   { opacity: 1; }
  }
  .modal {
    width: 100%; max-width: 1040px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    box-shadow: 0 18px 50px -12px rgba(17,18,20,0.18), 0 6px 18px -6px rgba(17,18,20,0.1);
    transform-origin: 50% 30%;
    animation: mb-modal 0.42s cubic-bezier(.22,.9,.28,1.06) both;
  }
  @keyframes mb-modal {
    0%   { opacity: 0; transform: translateY(18px) scale(0.985); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Exit = mirror of entry. */
  .modal-back.exiting { animation: mb-fadeOut 0.3s cubic-bezier(.3,.4,.6,1) forwards; }
  .modal.exiting       { animation: mb-modal-out 0.32s cubic-bezier(.4,.1,.7,1) forwards; }
  @keyframes mb-fadeOut { to { opacity: 0; backdrop-filter: blur(0); -webkit-backdrop-filter: blur(0); } }
  @keyframes mb-modal-out {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(18px) scale(0.985); }
  }
  @media (prefers-reduced-motion: reduce) {
    .modal-back, .modal { animation: none !important; }
  }

  /* Wapuu burst on modal close — quick, tiny shower from the close point. */
  .wapuu-poof {
    position: fixed; pointer-events: none; z-index: 9999;
    user-select: none; line-height: 0; opacity: 0;
    filter: drop-shadow(0 3px 2px rgba(0,0,0,0.18));
    animation: wapuu-poof 1.2s cubic-bezier(.25,.45,.45,1) forwards;
    will-change: transform, opacity;
  }
  .wapuu-poof img { display: block; width: 100%; height: 100%; }
  @keyframes wapuu-poof {
    0%   { transform: translate(-50%, -50%) scale(0.3) rotate(0); opacity: 0; }
    18%  { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 0.9; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.92) rotate(var(--rot)); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) { .wapuu-poof { display: none !important; } }
  .modal header {
    border-bottom: 1px solid var(--rule);
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    background: var(--paper-2);
  }
  .modal header .crumb {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--slate); letter-spacing: 0.02em;
  }
  .modal header .crumb .sl { color: var(--rule); margin: 0 6px; }
  .modal header .crumb b { color: var(--ink); }
  .modal header .close {
    width: 28px; height: 28px; border: 1px solid var(--rule);
    background: var(--paper); color: var(--slate); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal header .close:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .modal .body { display: grid; grid-template-columns: 1fr 300px; gap: 0; }
  @media (max-width: 860px) { .modal .body { grid-template-columns: 1fr; } }

  .modal .editor { padding: 28px 32px 32px; border-right: 1px solid var(--rule); }
  .modal .editor .permalink {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--slate); margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 1px dashed var(--rule);
    word-break: break-all;
  }
  .modal .editor .permalink .k { color: var(--wp); }
  .modal .editor .permalink b { color: var(--ink); }
  .modal .editor h1 {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 600;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "view": "grid",
  "titleMode": "fraktur",
  "showTerminal": true
}/*EDITMODE-END*/;

function useTweaks() {
  const [t, setT] = useState(TWEAK_DEFAULTS);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const h = (e) => {
      if (!e.data?.type) return;
      if (e.data.type === '__activate_edit_mode') setVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  const set = (edits) => { setT(p => { const n = {...p, ...edits}; window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); return n; }); };
  return { t, set, visible };
}

function useCart() {
  const [items, setItems] = useState(() => { try { return JSON.parse(localStorage.getItem('wpa_cart4')||'[]'); } catch { return []; } });
  useEffect(() => localStorage.setItem('wpa_cart4', JSON.stringify(items)), [items]);
  const add = (p, size='—') => setItems(prev => {
    const k = p.id + '@' + size;
    const ex = prev.find(x => x.key === k);
    if (ex) return prev.map(x => x.key === k ? { ...x, qty: x.qty+1 } : x);
    return [...prev, { key: k, id: p.id, name: p.name, price: p.price, size, qty: 1 }];
  });
  const remove = (key) => setItems(prev => prev.filter(x => x.key !== key));
  const setQty = (key, qty) => setItems(prev => qty <= 0 ? prev.filter(x => x.key !== key) : prev.map(x => x.key === key ? { ...x, qty } : x));
  const clear = () => setItems([]);
  const count = items.reduce((s,x) => s+x.qty, 0);
  const total = items.reduce((s,x) => s+x.qty*x.price, 0);
  return { items, add, remove, setQty, clear, count, total };
}

// deterministic helpers
function sku(id) { return 'WP—' + id.split('-').map(s => s.slice(0,3).toUpperCase()).join('·'); }
function hashN(id) { let h = 0; for (let i=0; i<id.length; i++) h = (h*31 + id.charCodeAt(i)) | 0; return Math.abs(h); }

// Glue the last two words with a non-breaking space so a single-word
// orphan never lands alone on the final line.
function tight(s) {
  return String(s).replace(/\s+([^\s]+)$/, '\u00A0$1');
}

// Tiny Wapuu burst — spawns N Wapuus from (x,y) that drift outward and fade.
// Triggered when the PDP modal closes.
function rainWapuus(x, y, count = 12) {
  const src = '../shared/wapuu.svg';
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'wapuu-poof';
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    el.appendChild(img);
    const size = 18 + Math.random() * 22; // 18–40px
    el.style.width  = size + 'px';
    el.style.height = size * (66 / 60) + 'px';
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.setProperty('--dx',  ((Math.random() - 0.5) * 220) + 'px');
    el.style.setProperty('--dy',  (60 + Math.random() * 200) + 'px');
    el.style.setProperty('--rot', ((Math.random() - 0.5) * 340) + 'deg');
    el.style.animationDelay = (i * 22) + 'ms';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300 + i * 22);
  }
}

// Wapuu's revision log — absurd, seeded per product so each PDP has its own.
const WAPUU_REVISIONS = [
  '1y ago — price +$1,000',
  '1w ago — price −$1,000',
  '3d ago — fixed typo (again)',
  '6h ago — added more cheese',
  '4h ago — hotfix: spelling',

  '3w ago — peer-reviewed by nobody',
  '2h ago — removed a TODO',
  '12d ago — renamed for vibes',
];
// Parse the "Xunit ago" prefix into an approximate age in hours so we can
// sort revision picks newest-first. Units are tried longest-first so "mo"
// matches before "m".
function revisionAgeHours(s) {
  const m = s.match(/^(\d+)\s*(mo|y|w|d|h|m)\b/);
  if (!m) return Infinity;
  const n = parseInt(m[1], 10);
  const mult = { m: 1/60, h: 1, d: 24, w: 168, mo: 720, y: 8760 };
  return n * mult[m[2]];
}
function pickRevisions(id, n = 3) {
  const out = [];
  const used = new Set();
  let seed = hashN(id) || 1;
  while (out.length < n && used.size < WAPUU_REVISIONS.length) {
    seed = (seed * 9301 + 49297) % 233280;
    const i = Math.floor((seed / 233280) * WAPUU_REVISIONS.length);
    if (used.has(i)) continue;
    used.add(i);
    out.push(WAPUU_REVISIONS[i]);
  }
  // Newest first — ascending by age.
  return out.sort((a, b) => revisionAgeHours(a) - revisionAgeHours(b));
}
function stockFor(id) { return hashN(id) % 240; }

function Ticker({ cart, onCartClick }) {
  const items = [...TICKER_ITEMS, ...TICKER_ITEMS]; // duplicate for seamless loop
  const [paused, setPaused] = useState(false);
  const pauseTimer = useRef(null);
  const togglePause = () => {
    if (pauseTimer.current) clearTimeout(pauseTimer.current);
    setPaused(true);
    pauseTimer.current = setTimeout(() => setPaused(false), 3000);
  };
  const onNewClick = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    rainWapuus(r.left + r.width/2, r.bottom + 10, 1);
  };
  return (
    <div className={`ticker ${paused ? 'paused' : ''}`}>

function CartDrawer({ open, onClose, cart }) {

  const empty = cart.items.length === 0;
  return (
    <>
      <div className={`cart-backdrop ${open ? 'on' : ''}`} onClick={onClose}/>

// Multi-image gallery with a single flip button. Uses MERCANTILE_IMAGES
// (array per product); falls back to procedural art if no real images.
function HLGallery({ p }) {
  const list = (window.MERCANTILE_IMAGES && window.MERCANTILE_IMAGES[p.id]) || [];
  const [i, setI] = useState(0);
  useEffect(() => { setI(0); }, [p.id]);
  const flip = () => setI(n => (n + 1) % list.length);
  const figNum = String(hashN(p.id) % 99).padStart(2,'0');
  return (
    <div className="gallery">
      <span className="frame-label"><b>fig. {figNum}</b> · {p.cat}</span>
      {list.length > 0
        ? <img className="gimg" src={list[i]} alt="" key={i}/>
        : <div className="gfallback" dangerouslySetInnerHTML={{__html: window.MERCANTILE_ART(p.id, { bg: '#f6f7f7', fg: '#3858e9' })}}/>}
      {list.length > 1
        ? <button className="flip-btn" onClick={flip} aria-label="Next image">see more · {i+1}/{list.length}</button>
        : <span className="dims">1600 × 1000px</span>}
    </div>
  );
}

  const COPY_SNARK = [
    'why are you trying to copy this, you weirdo? →',
    'ctrl+c ? ctrl-nope. →',
    'no clipboard. only vibes. →',
    "shortcodes don't work like that →",
    'forks and clones only, no copies →',
    'access denied, more wapuus needed →',
    'not today, scraper →',
  ];
  const [copyText, setCopyText] = useState(COPY_DEFAULT);
  const lastCopy = useRef('');
  const copyTimer = useRef(null);
  const onCopyClick = () => {
    const options = COPY_SNARK.filter(m => m !== lastCopy.current);
    const next = options[Math.floor(Math.random() * options.length)];
    lastCopy.current = next;
    setCopyText(next);
    if (copyTimer.current) clearTimeout(copyTimer.current);
    copyTimer.current = setTimeout(() => setCopyText(COPY_DEFAULT), 3200);
  };
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') closeWithRain(); };
    window.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', h); document.body.style.overflow = ''; };
  }, [onClose]);
  if (!p) return null;
  const apparel = p.cat === 'apparel';
  const sizes = apparel ? ['XS','S','M','L','XL','XXL','3XL'] : null;
  const related = window.MERCANTILE_CATALOG.filter(x => x.cat === p.cat && x.id !== p.id).slice(0, 5);
  const add = () => {
    if (state !== 'idle') return;
    setLabel(pickNextLabel(HL_LOADING_LABELS, lastLabel));
    setState('loading');
    setTimeout(() => {
      onAdd(p, sizes ? size : '—');
      setState('added');
      setTimeout(() => setState('idle'), 1200);
    }, 800);
  };
  const dateStr = new Date(Date.now() - (hashN(p.id) % 800)*864e5).toISOString().slice(0,10);
  return (
    <div className={`modal-back ${exiting ? 'exiting' : ''}`} onClick={(e) => { if (e.target.classList.contains('modal-back')) closeWithRain(e); }}>
      <div className={`modal ${exiting ? 'exiting' : ''}`} key={id} onClick={e => e.stopPropagation()}>
        <header>
          <div className="crumb">
            <span>mercantile</span><span className="sl">/</span>
            <span>{p.cat}</span><span className="sl">/</span>
            <b>{p.id}</b>
            <span style={{marginLeft:14, color:'var(--slate-2)'}}>post.php?action=edit</span>
          </div>
          <button className="close" onClick={closeWithRain} aria-label="Close">×</button>
        </header>
        <div className="body">
          <div className="editor">
            <div className="permalink">
              permalink: <span className="k">https://mercantile.wordpress.org/product/</span><b className="hl-blue">{p.id}</b>
              <span style={{marginLeft:10, color:'var(--slate-2)'}}>· modified {dateStr}</span>
            </div>
            <h1>{p.name}</h1>
            <p className="blurb">{tight(p.blurb)}</p>
            <div className="marginalia">
              <span className="pill blue">highlighted</span>
              <span className="pill">indexed</span>
              <span className="pill pink">in stock</span>
              <span className="pill">cross-ref · §{p.cat}</span>
            </div>
            <HLGallery p={p}/>
            <div className="shortcode">
              <span>[<span className="k">mercantile</span> <span className="k">id</span>=<span className="v">"{p.id}"</span>{sizes ? <> <span className="k">size</span>=<span className="v">"{size}"</span></> : null}]</span>
              <span className={`copy ${copyText !== COPY_DEFAULT ? 'snarked' : ''}`} onClick={onCopyClick}>{copyText}</span>
            </div>
          </div>
          <aside className="side">
            <div className="mb">
              <h3>Publish</h3>
              <div className="status-row"><span>status</span><span className="v g">● published</span></div>
              <div className="status-row"><span>visibility</span><span className="v">public</span></div>
              <div className="status-row"><span>stock</span><span className="v"><b>{stockFor(p.id)}</b> on hand</span></div>
              {sizes && (<>
                <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:'var(--slate)', marginTop:10, textTransform:'uppercase', letterSpacing:'0.08em'}}>Size</div>
                <div className="sizes">
                  {sizes.map(s => <button key={s} className={size===s?'on':''} onClick={() => setSize(s)}>{s}</button>)}
                </div>
              </>)}
              <button className={`add-btn state-${state}`} onClick={add}>
                {state === 'loading' ? label :
                 state === 'added'   ? '✓ added' :
                                       `Add to cart · $${p.price}`}
              </button>
            </div>
            <div className="mb">
              <h3>Details</h3>
              <dl className="specs side">
                <dt>SKU</dt><dd>{sku(p.id)}</dd>
                <dt>price</dt><dd><span className="hl-blue">${p.price}.00</span> USD</dd>
                <dt>category</dt><dd>{p.cat}</dd>
                <dt>tags</dt><dd className="tagwrap">{p.tags.map(t => <span key={t} className="tag-pill">#{t}</span>)}</dd>
                <dt>material</dt><dd>{tight(apparel ? '100% ring-spun cotton, 220gsm' : (p.cat === 'drinkware' ? 'double-wall insulated, BPA-free' : 'matte vinyl, durable finish'))}</dd>
                {apparel && (<><dt>care</dt><dd>cold wash · line dry · review PRs</dd></>)}
              </dl>
            </div>
            <div className="mb">
              <h3>Related</h3>
              <div className="related">
                {related.map(r => (
                  <a key={r.id} href={`#/p/${r.id}`} onClick={(e) => { e.preventDefault(); window.location.hash = `#/p/${r.id}`; }}>
                    <span>{tight(r.name)}</span><span className="p">${r.price}</span>
                  </a>
                ))}
              </div>
            </div>
            <div className="mb">
              <h3>Revisions</h3>
              <div className="revisions">
                {pickRevisions(p.id, 3).map((r, i) => (
                  <div key={i}><b>wapuu</b>, <span dangerouslySetInnerHTML={{__html: tight(r)}}/></div>
                ))}
              </div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  );
}

// ======== TWEAKS ========
function Tweaks({ t, set, visible }) {
  return (
    <div className={`tweaks ${visible?'on':''}`}>
      <h4>TWEAKS</h4>
      <div className="in">
        <label>Wordmark</label>
        <div className="row">
          {['fraktur','mono'].map(v => <button key={v} className={t.titleMode===v?'on':''} onClick={() => set({titleMode:v})}>{v}</button>)}
        </div>
        <label>Live ticker</label>
        <div className="row">
          <button className={t.showTerminal?'on':''} onClick={() => set({showTerminal: true})}>on</button>
          <button className={!t.showTerminal?'on':''} onClick={() => set({showTerminal: false})}>off</button>
        </div>
      </div>
    </div>
  );
}

// ======== ROUTE / APP ========
function useRoute() {
  const parse = () => {
    const h = location.hash.slice(1) || '/';
    const parts = h.split('/').filter(Boolean);
    if (parts[0] === 'p') return { view: 'product', id: parts[1] };
    return { view: 'list' };
  };
  const [r, setR] = useState(parse);
  useEffect(() => {
    const h = () => setR(parse());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  return r;
}

function App() {
  const { t, set, visible } = useTweaks();
  const route = useRoute();
  const cart = useCart();
  const [q, setQ] = useState('');
  const [cat, setCat] = useState('all');
  const [toast, setToast] = useState('');
  const [drawerOpen, setDrawerOpen] = useState(false);

  const onAdd = (p, size) => {
    cart.add(p, size);
    setToast(`✓ ${p.name} — ${size} — committed`);
    setTimeout(() => setToast(''), 1600);
  };

  const items = useMemo(() => {
    let list = window.MERCANTILE_CATALOG;
    if (cat !== 'all') list = list.filter(p => p.cat === cat);
    if (q.trim()) {
      const qq = q.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(qq) || p.tags.join(' ').includes(qq) || p.id.includes(qq));
    }
    return list;
  }, [q, cat]);

  const counts = {
    all: window.MERCANTILE_CATALOG.length,
    apparel: window.MERCANTILE_CATALOG.filter(x => x.cat==='apparel').length,
    drinkware: window.MERCANTILE_CATALOG.filter(x => x.cat==='drinkware').length,
    accessories: window.MERCANTILE_CATALOG.filter(x => x.cat==='accessories').length,
  };

  const open = (id) => { window.location.hash = `#/p/${id}`; };
  const close = () => { history.replaceState(null,'',window.location.pathname); window.dispatchEvent(new HashChangeEvent('hashchange')); };

  // Build rendered list with interstitials every 8 items
  const rendered = [];
  items.forEach((p, i) => {
    rendered.push(<Cell key={p.id} p={p} idx={i} onOpen={open}/>);
    if ((i+1) % 8 === 0 && i !== items.length - 1) {
      const kind = (i+1) === 8 ? 'code' : ((i+1) === 16 ? 'quote' : 'filelist');
      rendered.push(<Interstitial key={`int-${i}`} kind={kind}/>);
    }
  });

  return (
    <>
      {t.showTerminal && <Ticker cart={cart} onCartClick={() => setDrawerOpen(true)}/>}
      <Hero titleMode={t.titleMode} total={window.MERCANTILE_CATALOG.length}/>

      <div className="section-head" style={!t.showTerminal ? { top: 0 } : {}}>
        <div style={{display:'flex', alignItems:'center', gap: 18, flexWrap:'wrap'}}>
          <span className="label">§ Catalog</span>
          <div className="filters">
            <button className={cat==='all'?'on':''} onClick={() => setCat('all')}>All <span className="n">{counts.all}</span></button>
            <button className={cat==='apparel'?'on':''} onClick={() => setCat('apparel')}>Apparel <span className="n">{counts.apparel}</span></button>
            <button className={cat==='drinkware'?'on':''} onClick={() => setCat('drinkware')}>Drinkware <span className="n">{counts.drinkware}</span></button>
            <button className={cat==='accessories'?'on':''} onClick={() => setCat('accessories')}>Accessories <span className="n">{counts.accessories}</span></button>
          </div>
          <select className="filters-m" value={cat} onChange={e => setCat(e.target.value)} aria-label="Filter by category">
            <option value="all">All · {counts.all}</option>
            <option value="apparel">Apparel · {counts.apparel}</option>
            <option value="drinkware">Drinkware · {counts.drinkware}</option>
            <option value="accessories">Accessories · {counts.accessories}</option>
          </select>
        </div>
        <div className="right">
          <input className="search" placeholder="grep products…" value={q} onChange={e => setQ(e.target.value)}/>
          <button className="cart" onClick={() => setDrawerOpen(true)} style={{cursor:'pointer'}}>cart · <span className="n">{cart.count}</span> · ${cart.total}</button>
        </div>
      </div>

      <div className="grid-wrap">
        <div className="grid" key={`${cat}|${q}`}>
          {rendered}
        </div>
      </div>

      <Band/>

      <footer className="footer-band">
        <div>
          <div className="frak">Mercantile<span className="d">.</span></div>
          <div style={{marginTop: 14, maxWidth: '50ch'}}>
            <b style={{color:'#fff'}}>mercantile.wordpress.org</b> · shop of the open web · shipping worldwide since 2003 · licensed under the GPLv2 · made with ♥︎ and WooCommerce and WordPress, of course · a proto with the cutest omnibar by jill
          </div>
        </div>
        <div>
          <h4>Shop</h4>
          <a>Apparel</a><br/>
          <a>Drinkware</a><br/>
          <a>Accessories</a><br/>
          <a>Cozy Collection</a><br/>
          <a>Heritage</a><br/>
          <a>Wapuu</a>
        </div>
        <div>
          <h4>Elsewhere</h4>
          <a>wordpress.org</a><br/>
          <a>WordCamp</a><br/>
          <a>Five for the Future</a><br/>
          <a>Contribute</a><br/>
          <a>News</a>
          <h4 style={{marginTop:18}}>Contact</h4>
          <a>shop@wordpress.org</a>
        </div>
        <div className="bottom-row">
          <span>© 2003–2026 WordPress Foundation · <b>GPLv2</b></span>
          <span>v2.1.0 · php 8.3 · build 8401</span>
        </div>
      </footer>

      {route.view === 'product' && <ProductModal id={route.id} onClose={close} onAdd={onAdd}/>}
      <CartDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} cart={cart}/>
      <Tweaks t={t} set={set} visible={visible}/>
      <div className={`toast ${toast?'on':''}`}><span className="ok">●</span>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<div id="root"></div>
</body>
</html>
