<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wapuu's World · Mercantile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../shared/catalog.js"></script>
<script src="../shared/product-art.js"></script>
<style>
  :root {
    --wp: #3858e9;
    --lilac: #d9d2ff;
    --sky: #b9d8ff;
    --pink: #ffb8d4;
    --yellow: #ffe066;
    --grass: #6dc77a;
    --peach: #ffb0a3;
    --paper: #e9e4ff;
    --ink: #1a1a22;
    --shadow: rgba(26,26,34,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--paper); color: var(--ink); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 15px; overflow-x: hidden; }
  body { background-image: radial-gradient(circle at 20% 20%, rgba(185,216,255,0.5) 0, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255,184,212,0.4) 0, transparent 40%); }
  ::selection { background: var(--wp); color: white; }
  button { font:inherit; border: 0; background: none; cursor: pointer; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .hand { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; letter-spacing: -0.01em; }
  .serif { font-family: 'DM Serif Display', serif; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }

  /* ---------- nav ---------- */
  .nav {
    position: sticky; top: 12px; z-index: 50;
    margin: 12px auto; max-width: 1200px;
    display:flex; align-items: center; justify-content: space-between;
    padding: 10px 12px 10px 20px; background: white;
    border: 2px solid var(--ink); border-radius: 100px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .nav .brand { display:flex; align-items:center; gap: 10px; font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.01em; }
  .nav .brand .w { width: 32px; height: 32px; }
  .nav .links { display:flex; gap: 4px; }
  .nav .links a { padding: 6px 12px; border-radius: 100px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .nav .links a:hover { background: var(--yellow); }
  .nav .cart { padding: 8px 16px; background: var(--wp); color: white; border-radius: 100px; font-weight: 600; font-size: 14px; border: 2px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); transition: all 0.2s; }
  .nav .cart:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }

  /* ---------- hero: a living map ---------- */
  .hero { position: relative; min-height: 620px; max-width: 1200px; margin: 24px auto; padding: 20px; }
  .hero .tag { position: absolute; top: 20px; left: 36px; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 15px; color: var(--wp); letter-spacing: -0.01em; z-index: 2; text-transform: lowercase; }
  .hero .welcome {
    font-family: 'DM Serif Display', serif; font-size: clamp(64px, 12vw, 160px);
    line-height: 0.9; margin: 40px 0 24px; letter-spacing: -0.02em;
  }
  .hero .welcome em { font-style: italic; color: var(--wp); }
  .hero .welcome .underline { background: linear-gradient(var(--pink), var(--pink)) no-repeat; background-size: 100% 0.28em; background-position: 0 94%; }
  .hero p.lede { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 500; font-size: 19px; max-width: 540px; line-height: 1.45; margin: 0 0 32px; color: #333; letter-spacing: -0.01em; }
  .hero .cta { display:inline-flex; align-items:center; gap: 10px; padding: 14px 22px; background: var(--ink); color: var(--paper); border-radius: 100px; font-weight: 600; font-size: 15px; border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--wp); transition: all 0.2s; }
  .hero .cta:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--wp); }

  /* ---------- the map pins ---------- */
  .map { position: relative; max-width: 1200px; margin: 0 auto 60px; padding: 40px 20px 80px; }
  .map .floor { position: absolute; inset: 40px 20px 80px 20px; border-radius: 32px; background: linear-gradient(180deg, #fff 0%, #f3f0ff 100%); border: 2px solid var(--ink); box-shadow: 8px 8px 0 var(--ink); overflow: hidden; }
  .map .floor::before { content:''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.5; }
  .map .grid {
    position: relative; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: auto auto;
    gap: 24px; padding: 40px; min-height: 500px;
  }
  .pin {
    background: white; border: 2px solid var(--ink); border-radius: 24px;
    padding: 24px; position: relative;
    box-shadow: 4px 4px 0 var(--ink); transition: transform 0.3s cubic-bezier(.2,.9,.3,1.2), box-shadow 0.25s;
    display:flex; flex-direction: column; gap: 12px; cursor: pointer; text-decoration: none; color: inherit;
  }
  .pin:hover { transform: translate(-3px,-3px) rotate(-1deg); box-shadow: 8px 8px 0 var(--ink); }
  .pin .label { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 13px; color: var(--wp); letter-spacing: -0.01em; text-transform: lowercase; }
  .pin h3 { font-family: 'DM Serif Display', serif; font-size: 28px; margin: 0; line-height: 1; }
  .pin p { font-size: 13px; color: #555; margin: 0; line-height: 1.45; }
  .pin .ico { width: 48px; height: 48px; }
  .pin:nth-child(1) { background: var(--sky); }
  .pin:nth-child(2) { background: var(--yellow); }
  .pin:nth-child(3) { background: var(--pink); }
  .pin:nth-child(4) { background: var(--lilac); }
  .pin:nth-child(5) { background: white; }
  .pin:nth-child(6) { background: var(--sky); }

  /* ---------- Wapuu companion (follows cursor / sits on screen) ---------- */
  .wapuu-companion {
    position: fixed; bottom: 24px; left: 24px; z-index: 55;
    width: 72px; height: 72px; pointer-events: none;
    transition: transform 0.4s cubic-bezier(.2,.9,.3,1.2);
  }
  .wapuu-companion.happy { transform: translateY(-8px) rotate(-6deg); }
  .wapuu-companion svg { width:100%; height:100%; filter: drop-shadow(3px 3px 0 var(--ink)); }
  .wapuu-bubble {
    position: fixed; bottom: 80px; left: 110px; z-index: 55;
    background: white; border: 2px solid var(--ink); border-radius: 18px;
    padding: 10px 14px; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 500; font-size: 14px; letter-spacing: -0.01em;
    box-shadow: 3px 3px 0 var(--ink); opacity: 0; transform: scale(0.8); transform-origin: bottom left;
    transition: all 0.25s cubic-bezier(.2,.9,.3,1.3); pointer-events: none; white-space: nowrap;
  }
  .wapuu-bubble.on { opacity: 1; transform: scale(1); }

  /* ---------- shop ---------- */
  .shop-hero { max-width: 1200px; margin: 0 auto; padding: 40px 20px 0; position:relative; }
  .shop-hero .kicker { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 14px; color: var(--wp); display:inline-block; margin-bottom: 12px; text-transform: lowercase; letter-spacing: -0.01em; }
  .shop-hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(56px, 10vw, 120px); line-height: 0.92; margin: 0 0 16px; letter-spacing: -0.02em; }
  .shop-hero h1 em { font-style: italic; color: var(--wp); }
  .shop-hero p { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 500; font-size: 18px; max-width: 520px; line-height: 1.45; color: #333; margin-top: 20px; letter-spacing: -0.01em; }

  .filters {
    max-width: 1200px; margin: 32px auto; padding: 16px 20px;
    display:flex; flex-wrap: wrap; gap: 8px; align-items:center;
    border-top: 2px dashed var(--ink); border-bottom: 2px dashed var(--ink);
  }
  .filters .chip { padding: 6px 14px; background: white; border: 2px solid var(--ink); border-radius: 100px; font-size: 13px; font-weight: 500; transition: all 0.2s; box-shadow: 2px 2px 0 var(--ink); }
  .filters .chip:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .filters .chip.on { background: var(--yellow); }
  .filters .count { margin-left: auto; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 14px; color: var(--wp); letter-spacing: -0.01em; }

  .shelf { max-width: 1200px; margin: 0 auto 80px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; }
  .product {
    background: white; border: 2px solid var(--ink); border-radius: 24px;
    padding: 18px; position: relative; cursor: pointer; text-decoration: none; color: inherit;
    box-shadow: 5px 5px 0 var(--ink); transition: all 0.3s cubic-bezier(.2,.9,.3,1.2);
    display:flex; flex-direction: column; gap: 10px;
  }
  .product:hover { transform: translate(-3px,-3px); box-shadow: 10px 10px 0 var(--ink); }
  .product:nth-child(3n+1) { background: white; }
  .product:nth-child(3n+2) { background: var(--pink); }
  .product:nth-child(3n+3) { background: var(--yellow); }
  .product .img { aspect-ratio: 1; background: rgba(255,255,255,0.6); border-radius: 14px; border: 2px dashed var(--ink); overflow: hidden; position:relative; }
  .product .img svg { width: 100%; height: 100%; }
  .product h3 { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 500; font-size: 15px; margin: 0; line-height: 1.3; letter-spacing: -0.01em; text-wrap: balance; }
  .product .row { display:flex; justify-content:space-between; align-items:center; }
  .product .price { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .product .add { padding: 6px 12px; background: var(--ink); color: var(--paper); border-radius: 100px; font-size: 12px; font-weight: 600; }
  .product .add:hover { background: var(--wp); }
  .product .sticker {
    position: absolute; top: -10px; right: -10px;
    background: var(--wp); color: white; border: 2px solid var(--ink); border-radius: 100px;
    padding: 4px 10px; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 12px; letter-spacing: -0.01em;
    transform: rotate(8deg); box-shadow: 2px 2px 0 var(--ink);
  }

  /* ---------- PDP: zine layout ---------- */
  .pdp { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
  .pdp .back { display:inline-flex; align-items:center; gap: 6px; padding: 6px 14px; background: white; border: 2px solid var(--ink); border-radius: 100px; font-size: 13px; font-weight: 500; margin-bottom: 24px; box-shadow: 2px 2px 0 var(--ink); }
  .pdp .frame {
    position: relative; display:grid; grid-template-columns: 1fr 1fr; gap: 40px;
    background: white; border: 2px solid var(--ink); border-radius: 32px; padding: 40px;
    box-shadow: 8px 8px 0 var(--ink);
  }
  .pdp .gal { background: var(--lilac); border: 2px solid var(--ink); border-radius: 24px; aspect-ratio: 1; display:flex; align-items:center; justify-content:center; overflow:hidden; position: relative; }
  .pdp .gal svg { width: 80%; }
  .pdp .gal .label { position: absolute; bottom: 16px; left: 16px; background: white; border: 2px solid var(--ink); border-radius: 100px; padding: 4px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .pdp .gal .arrow { position: absolute; top: 20px; right: 20px; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 13px; color: var(--wp); letter-spacing: -0.01em; text-transform: lowercase; }
  .pdp .info h1 { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 500; font-size: clamp(28px, 4.2vw, 44px); line-height: 1.15; margin: 8px 0; letter-spacing: -0.02em; text-wrap: balance; }
  .pdp .info .hand-note { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 13px; color: var(--wp); margin-bottom: 8px; display:inline-block; text-transform: lowercase; letter-spacing: -0.01em; }
  .pdp .info .price { font-family: 'DM Serif Display', serif; font-size: 36px; margin: 16px 0; }
  .pdp .info .desc { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; line-height: 1.6; color: #333; margin-bottom: 24px; }
  .pdp .sizes { display:flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 24px; }
  .pdp .sizes button { padding: 8px 14px; background: white; border: 2px solid var(--ink); border-radius: 100px; font-weight: 500; font-size: 13px; }
  .pdp .sizes button.on { background: var(--yellow); }
  .pdp .buy { padding: 14px 24px; background: var(--ink); color: var(--paper); border-radius: 100px; font-weight: 600; font-size: 15px; border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--wp); transition: all 0.2s; display:inline-flex; align-items:center; gap: 8px; }
  .pdp .buy:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--wp); }
  .pdp .buy.added { background: var(--grass); color: var(--ink); box-shadow: 4px 4px 0 var(--ink); }

  /* doodle scattered around pdp */
  .pdp .doodle { position: absolute; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 13px; color: var(--wp); pointer-events: none; letter-spacing: -0.01em; text-transform: lowercase; }
  .pdp .d1 { top: -14px; right: 60px; font-size: 14px; background: var(--paper); padding: 2px 10px; border: 2px solid var(--ink); border-radius: 100px; }
  .pdp .d2 { bottom: -14px; left: 80px; font-size: 14px; color: var(--ink); background: var(--yellow); padding: 2px 10px; border: 2px solid var(--ink); border-radius: 100px; }

  /* related products on PDP */
  .related { max-width: 1200px; margin: 40px auto 0; padding: 0 20px; }
  .related h2 { font-family: 'DM Serif Display', serif; font-size: 32px; margin: 0 0 20px; letter-spacing: -0.02em; }
  .related .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .related .r { background: white; border: 2px solid var(--ink); border-radius: 18px; padding: 12px; box-shadow: 3px 3px 0 var(--ink); transition: all 0.25s cubic-bezier(.2,.9,.3,1.2); display:flex; flex-direction: column; gap: 8px; }
  .related .r:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .related .r:nth-child(2n) { background: var(--pink); }
  .related .r:nth-child(3n) { background: var(--yellow); }
  .related .r .img { aspect-ratio: 1; background: rgba(255,255,255,0.5); border: 2px dashed var(--ink); border-radius: 10px; overflow:hidden; }
  .related .r .img svg { width: 100%; height: 100%; }
  .related .r h4 { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-weight: 500; font-size: 13px; margin: 0; line-height: 1.3; text-wrap: balance; }
  .related .r .pr { font-family: 'DM Serif Display', serif; font-size: 16px; }

  /* ---------- cart ---------- */
  .backdrop { position: fixed; inset: 0; background: rgba(26,26,34,0.4); z-index: 60; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .backdrop.on { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 12px; right: 12px; bottom: 12px; width: 420px; max-width: calc(100vw - 24px); background: var(--paper); z-index: 61; border: 2px solid var(--ink); border-radius: 28px; box-shadow: 6px 6px 0 var(--ink); transform: translateX(calc(100% + 24px)); transition: transform 0.4s cubic-bezier(.2,.9,.3,1.1); display:flex; flex-direction:column; overflow: hidden; }
  .drawer.on { transform: translateX(0); }
  .drawer header { padding: 20px 24px; background: var(--yellow); border-bottom: 2px solid var(--ink); display:flex; justify-content:space-between; align-items:center; }
  .drawer header h2 { font-family: 'DM Serif Display', serif; font-size: 28px; margin: 0; font-style: italic; }
  .drawer .items { flex: 1; overflow-y: auto; padding: 12px 24px; }
  .drawer .item { display:grid; grid-template-columns: 60px 1fr auto; gap: 12px; padding: 12px 0; border-bottom: 1px dashed rgba(0,0,0,0.2); align-items:center; }
  .drawer .item .img { width: 60px; height: 60px; background: white; border: 2px solid var(--ink); border-radius: 12px; overflow:hidden; }
  .drawer .item .img svg { width:100%; height:100%; }
  .drawer .item h4 { font-family: 'DM Serif Display', serif; font-size: 17px; margin: 0 0 2px; }
  .drawer .item .qty { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; }
  .drawer .item .x { font-family: 'Caveat', cursive; font-size: 16px; color: #555; cursor: pointer; }
  .drawer .item .x:hover { color: var(--wp); }
  .drawer .empty { text-align: center; padding: 60px 20px; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 500; font-size: 16px; color: #666; letter-spacing: -0.01em; }
  .drawer footer { padding: 20px 24px; border-top: 2px solid var(--ink); background: var(--pink); }
  .drawer footer .row { display:flex; justify-content:space-between; align-items:center; font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 12px; }
  .drawer footer button { width: 100%; padding: 14px; background: var(--ink); color: var(--paper); border-radius: 100px; font-weight: 600; font-size: 15px; border: 2px solid var(--ink); transition: all 0.2s; }
  .drawer footer button:hover { background: var(--wp); }

  /* ---------- footer ---------- */
  .pg-footer { max-width: 1200px; margin: 80px auto 40px; padding: 40px; background: white; border: 2px solid var(--ink); border-radius: 32px; box-shadow: 6px 6px 0 var(--ink); position: relative; overflow: hidden; }
  .pg-footer h3 { font-family: 'DM Serif Display', serif; font-size: clamp(48px, 9vw, 120px); line-height: 0.9; margin: 0 0 24px; letter-spacing: -0.02em; }
  .pg-footer h3 em { font-style: italic; color: var(--wp); }
  .pg-footer .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin: 40px 0; }
  .pg-footer .row h4 { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; font-size: 13px; color: var(--wp); margin: 0 0 8px; letter-spacing: -0.01em; text-transform: lowercase; }
  .pg-footer .row ul { list-style: none; padding: 0; margin: 0; font-size: 14px; line-height: 2; }
  .pg-footer .row ul a:hover { color: var(--wp); }
  .pg-footer .fine { border-top: 1px dashed var(--ink); padding-top: 16px; display:flex; justify-content:space-between; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #666; }

  /* ---------- toast ---------- */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(150%); background: var(--ink); color: var(--paper); padding: 12px 20px; border-radius: 100px; font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 500; font-size: 14px; letter-spacing: -0.01em; z-index: 80; border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--wp); transition: transform 0.35s cubic-bezier(.2,.9,.3,1.3); }
  .toast.on { transform: translateX(-50%) translateY(0); }

  /* ---------- tweaks ---------- */
  .tweaks { position: fixed; bottom: 24px; right: 24px; background: white; border: 2px solid var(--ink); border-radius: 20px; padding: 16px; z-index: 70; width: 260px; font-size: 13px; display: none; box-shadow: 4px 4px 0 var(--ink); }
  .tweaks.on { display: block; }
  .tweaks h4 { margin: 0 0 12px; font-family: 'DM Serif Display', serif; font-size: 22px; font-style: italic; }
  .tweaks label { display:block; margin: 8px 0 4px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #555; }
  .tweaks .swatches { display:flex; gap: 6px; }
  .tweaks .swatches button { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--ink); cursor: pointer; }
  .tweaks .swatches button.on { transform: scale(1.15); box-shadow: 0 0 0 2px var(--sun); }
  .tweaks input[type=range] { width: 100%; }

  @media (max-width: 900px) {
    .nav .links { display:none; }
    .map .grid { grid-template-columns: 1fr; }
    .pdp .frame { grid-template-columns: 1fr; }
    .pg-footer .row { grid-template-columns: 1fr 1fr; }
    .wapuu-companion, .wapuu-bubble { display:none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "wapuuColor": "grass",
  "vibe": "lilac",
  "wapuuTalk": true
}/*EDITMODE-END*/;

const WAPUU_COLORS = { grass: '#6dc77a', wp: '#3858e9', pink: '#ff8ecc', sun: '#ffd966' };
const VIBES = {
  lilac: { paper: '#e9e4ff' },
  sky:   { paper: '#dceafd' },
  bone:  { paper: '#f5f1e8' },
  peach: { paper: '#ffe5dc' },
};

// ---------- Wapuu SVG (original, simple, friendly) ----------
function WapuuSVG({ color = '#6dc77a', mood = 'neutral' }) {
  // Wapuu — the WordPress mascot. Round body, big ears, little fin on head, chubby arms.
  return (
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="110" rx="28" ry="4" fill="rgba(0,0,0,0.18)"/>
      {/* ears */}

function useTweaks() {
  const [t, setT] = useState(TWEAK_DEFAULTS);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const h = (e) => {
      if (!e.data?.type) return;
      if (e.data.type === '__activate_edit_mode') setVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--paper', VIBES[t.vibe]?.paper || VIBES.lilac.paper);
  }, [t]);
  const set = (edits) => {
    const next = { ...t, ...edits };
    setT(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };
  return { t, set, visible };
}

function useCart() {
  const [items, setItems] = useState(() => {
    try { return JSON.parse(localStorage.getItem('wapuu_cart') || '[]'); } catch { return []; }
  });
  useEffect(() => localStorage.setItem('wapuu_cart', JSON.stringify(items)), [items]);
  const add = (p, size='M') => setItems(prev => {
    const k = p.id + '@' + size;
    const ex = prev.find(x => x.key === k);
    if (ex) return prev.map(x => x.key === k ? { ...x, qty: x.qty + 1 } : x);
    return [...prev, { key: k, id: p.id, name: p.name, price: p.price, size, qty: 1 }];
  });
  const remove = (k) => setItems(prev => prev.filter(x => x.key !== k));
  const total = items.reduce((s,x) => s + x.price*x.qty, 0);
  const count = items.reduce((s,x) => s + x.qty, 0);
  return { items, add, remove, total, count };
}

function useRoute() {
  const parse = () => {
    const h = location.hash.slice(1) || '/';
    const parts = h.split('/').filter(Boolean);
    if (parts[0] === 'shop') return { page: 'shop', cat: parts[1] };
    if (parts[0] === 'p') return { page: 'pdp', id: parts[1] };
    return { page: 'home' };
  };
  const [r, setR] = useState(parse);
  useEffect(() => {
    const h = () => { setR(parse()); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  return r;
}

function Companion({ t }) {
  const [msg, setMsg] = useState("hi! i'm wapuu ✿");
  const [show, setShow] = useState(false);
  const [happy, setHappy] = useState(false);
  useEffect(() => {
    const lines = [
      "psst ~ stickers are upstairs",
      "ooo nice taste",
      "the tackle twill is my favorite",
      "want a sticker?",
      "everything ships on thursdays ✿",
      "this is a friendly shop",
    ];
    let i = 0;
    const tick = () => {
      setMsg(lines[i % lines.length]);
      setShow(true);
      setHappy(true);
      setTimeout(() => setHappy(false), 600);
      setTimeout(() => setShow(false), 3200);
      i++;
    };
    const timer = setInterval(tick, 7000);
    setTimeout(() => { setShow(true); setTimeout(() => setShow(false), 3500); }, 1200);
    return () => clearInterval(timer);
  }, []);
  if (!t.wapuuTalk) return null;
  return (
    <>
      <div className={`wapuu-companion ${happy?'happy':''}`}>
        <WapuuSVG color={WAPUU_COLORS[t.wapuuColor] || WAPUU_COLORS.grass} mood={happy ? 'happy' : 'neutral'}/>
      </div>
      <div className={`wapuu-bubble ${show?'on':''}`}>{msg}</div>
    </>
  );
}

function App() {
  const { t, set, visible } = useTweaks();
  const route = useRoute();
  const cart = useCart();
  const [drawer, setDrawer] = useState(false);
  const [toast, setToast] = useState('');
  const onAdd = (p, size='M') => {
    cart.add(p, size);
    setToast(`✿ ${p.name} — into the bag!`);
    setTimeout(() => setToast(''), 1800);
  };
  return (
    <>
      <Nav cart={cart} openCart={() => setDrawer(true)} wapuuColor={t.wapuuColor}/>
      {route.page === 'home' && <Hero/>}
      {route.page === 'shop' && <Shop cat={route.cat} onAdd={onAdd}/>}
      {route.page === 'pdp' && <PDP id={route.id} onAdd={onAdd}/>}
      <Footer/>
      <CartDrawer open={drawer} onClose={() => setDrawer(false)} cart={cart}/>
      <Companion t={t}/>
      <Tweaks t={t} set={set} visible={visible}/>
      <div className={`toast ${toast?'on':''}`}>{toast}</div>
    </>
  );
}
